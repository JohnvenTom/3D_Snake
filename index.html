<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Snake // 三维贪吃蛇</title>

    <!-- Favicon: 等距3D蛇头 - 霓虹粗野主义风格 -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='face' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23d4ff33'/%3E%3Cstop offset='100%25' stop-color='%23c8ff00'/%3E%3C/linearGradient%3E%3ClinearGradient id='top' x1='0%25' y1='100%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' stop-color='%23e8ff66'/%3E%3Cstop offset='100%25' stop-color='%23d4ff33'/%3E%3C/linearGradient%3E%3ClinearGradient id='side' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2399cc00'/%3E%3Cstop offset='100%25' stop-color='%2380a800'/%3E%3C/linearGradient%3E%3C/defs%3E%3C!-- 等距立方体(蛇头) --%3E%3C!-- 顶面 --%3E%3Cpolygon points='32,6 56,20 32,34 8,20' fill='url(%23top)'/%3E%3C!-- 左侧面 --%3E%3Cpolygon points='8,20 32,34 32,58 6,44' fill='url(%23side)'/%3E%3C!-- 右侧面(正面) --%3E%3Cpolygon points='32,34 56,20 56,44 32,58' fill='url(%23face)'/%3E%3C!-- 蛇眼 - 右侧面 --%3E%3Ccircle cx='42' cy='40' r='3.5' fill='%230a0908'/%3E%3Ccircle cx='43' cy='39' r='1.2' fill='%23fff' opacity='0.7'/%3E%3C!-- 蛇眼 - 左侧面(透视) --%3E%3Cellipse cx='21' cy='40' rx='2.8' ry='2.2' fill='%230a0908'/%3E%3C/svg%3E">

    <!-- Google Fonts: Unbounded (几何粗野) + Space Mono (技术等宽) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500;800;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- 项目样式表 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- ===== 背景系统 ===== -->
    <div class="bg-system" aria-hidden="true">
        <div class="bg-gradient"></div>
        <div class="bg-grid"></div>
        <div class="bg-scanlines"></div>
        <div class="corner-deco tl"></div>
        <div class="corner-deco tr"></div>
        <div class="corner-deco bl"></div>
        <div class="corner-deco br"></div>
    </div>

    <!-- Three.js 游戏画布容器 -->
    <div id="game-container" role="img" aria-label="3D贪吃蛇游戏场景"></div>

    <!-- ===== UI 面板 ===== -->

    <!-- 分数面板 — 左上角 -->
    <aside class="score-panel" aria-live="polite">
        <div class="score-label">Score</div>
        <div class="score-value" id="score-display">0</div>
    </aside>

    <!-- 状态面板 — 右上角 -->
    <aside class="status-panel">
        <div class="status-row">
            <span class="status-label">Length</span>
            <span class="status-num" id="length-display">4</span>
        </div>
        <div class="status-row">
            <span class="status-label">Speed</span>
            <span class="status-num" id="speed-display">1.0x</span>
        </div>
    </aside>

    <!-- 控制提示面板 — 左下角 -->
    <nav class="controls-panel" aria-label="操作说明">
        <div class="controls-label">Controls</div>
        <!-- 操作模式切换器 -->
        <div class="mode-switcher">
            <button class="mode-btn active" id="mode-world" type="button">WORLD</button>
            <button class="mode-btn" id="mode-camera" type="button">CAMERA</button>
        </div>
        <div class="mode-hint">Press Tab to switch</div>
        <div class="controls-grid">
            <div class="ctrl-item"><span class="key-cap">W</span><span id="label-w">Z- Fwd</span></div>
            <div class="ctrl-item"><span class="key-cap">Q</span><span>Y+ Up</span></div>
            <div class="ctrl-item"><span class="key-cap">E</span><span>Y- Down</span></div>
            <div class="ctrl-item"><span class="key-cap">A</span><span>X-</span></div>
            <div class="ctrl-item"><span class="key-cap">S</span><span id="label-s">Z+ Back</span></div>
            <div class="ctrl-item"><span class="key-cap">D</span><span>X+</span></div>
        </div>
        <div class="camera-hint" style="margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 9px; color: var(--text-dim); letter-spacing: 1px; display: flex; gap: 12px;">
            <span>Drag = Rotate</span>
            <span>Scroll = Zoom</span>
        </div>
    </nav>

    <!-- 品牌水印 — 右下角 -->
    <div class="brand-mark" aria-hidden="true">3D Snake v1.0</div>

    <!-- ===== 开始界面 ===== -->
    <div class="start-overlay" id="start-overlay" role="dialog" aria-labelledby="start-title-text">
        <div class="start-modal">
            <h1 class="start-title" id="start-title-text">3D SNAKE</h1>
            <p class="start-subtitle">// xyz axis edition</p>
            <button class="start-btn" id="start-btn" type="button">Launch Game</button>
            <p class="start-hint">press <kbd>Enter</kbd> or <kbd>Space</kbd> to start</p>
        </div>
    </div>

    <!-- ===== 游戏结束弹窗 ===== -->
    <div class="game-over-overlay" id="game-over-overlay" role="dialog" aria-labelledby="go-final-score" aria-modal="true">
        <div class="game-over-modal">
            <span class="go-tag">System Failure</span>
            <h2 class="go-title">Game Over</h2>
            <p class="go-reason" id="go-reason">边界碰撞 / 自身碰撞</p>
            <p class="go-score-label">Final Score</p>
            <div class="go-score-value" id="final-score">0</div>
            <button class="restart-btn" id="restart-btn" type="button">Play Again</button>
        </div>
    </div>

    <!-- 应用入口（ES Module 方式加载，自动执行初始化） -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
